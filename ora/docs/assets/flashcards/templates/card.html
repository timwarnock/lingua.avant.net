<div id="flashcard-close" class="hand" tooltip="Close">×</div>
<div id="fc-status" class="flashcard-status"></div>
<div id="flashcard-content-wrapper">
  <div id="flashcard-front"></div>
  <div id="flashcard-back" style="visibility:hidden;opacity:0;"></div>
</div>
<div class="flashcard-buttons-bar">
  <div id="flashcard-skip" class="hand flashcard-button">skip</div>
  <div id="flashcard-pause" class="hand flashcard-button flashcard-button-pause">pause</div>
  <div id="flashcard-okay" class="hand flashcard-button">flip</div>
</div>
<audio id="flashcard-audio" style="display:none;"></audio>
